ai_usage_summary: |
  Used Gemini for system architecture design and pipeline development.
  Used Claude for code review, tie-breaker sorting validation, and refactoring.
  No candidate data was sent to hosted APIs during the ranking execution step.

methodology_summary: |
  A hybrid dense-sparse candidate ranking pipeline.
  Stream-reads candidates to detect and filter out honeypot anomalies.
  Uses a fast BM25 index over JD keywords to funnel 100k profiles to 2,000 in ~12 seconds.
  Runs local SentenceTransformer (all-MiniLM-L6-v2) semantic scoring on the 2,000,
  modulated by Redrob behavioral signals (notice period, response rates, location).
  Applies a local Cross-Encoder (ms-marco-MiniLM-L-6-v2) to re-rank the top 200,
  producing the final top 100 with dynamic, fact-based reasoning.
  Runs end-to-end on CPU in 111 seconds.

